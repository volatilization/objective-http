name: Test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v3
      - name: Setup nodejs
        uses: actions/setup-node@v3
        with:
          node-version: 22
      - name: Install the dependencies
        run: npm ci
      - name: Linter check
        run: npm run lint
      - name: Tests check
        run: npm run test:coverage
        env:
          COVERAGE_MIN_PERCENT: ${{vars.coverage_min_percent}}
