name: Test hook

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Setup nodejs
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - name: Install the dependencies
        run: npm ci
      - name: Linter check
        run: npm run lint
      - name: Tests check
        run: npm run test:coverage
